name: CI
on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint_js:
    name: Lint JS (Oxlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oxc-project/oxlint-action@v2.0.1
        with:
          config: .oxlintrc.json
        continue-on-error: true

  format_js:
    name: Format JS (Oxfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run format:check

  format_c_sharp:
    name: Format C# (dotnet format)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - name: Run Dotnet format
        run: |
          dotnet format whitespace --no-restore --verify-no-changes
          dotnet format style --no-restore --verify-no-changes
